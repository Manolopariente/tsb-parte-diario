<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSB — Parte Diario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --azul:#1e3070;
  --azul2:#152558;
  --verde:#8dc63f;
  --verde2:#6fa832;
  --rojo:#e53935;
  --gris:#f0f2f5;
  --borde:#d1d9e6;
  --texto:#1a2340;
  --muted:#6b7a99;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gris);color:var(--texto);min-height:100vh;}
.screen{display:none;}.screen.active{display:block;}

.topbar{background:var(--azul);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;color:white;}
.contenido{padding:16px;max-width:500px;margin:auto;}

.info-banner{background:var(--azul);border-radius:14px;padding:16px;margin-bottom:16px;color:white;}
.info-banner-fecha{margin-top:10px;}

input[type="date"]{padding:6px;border-radius:6px;border:none;}

.btn{width:100%;padding:12px;border:none;border-radius:8px;background:var(--verde);color:white;margin-top:10px;}

</style>
</head>
<body>

<div class="topbar">PARTE DIARIO</div>

<div class="contenido">

<div class="info-banner">
  <div>Seleccionar fecha del parte</div>
  <div class="info-banner-fecha">
    <input type="date" id="fechaParte">
    <div id="fechaTexto"></div>
  </div>
</div>

<button class="btn" onclick="guardarParte()">GUARDAR PARTE</button>

</div>

<script>

var API="https://script.google.com/macros/s/AKfycbyCRn32pNeZTkbdqxyOZFT9qwZdyBGAQZ5hSyapM8eqXkKGaijWWerBGH48Q9blUzsX/exec";

function fechaArgentinaDesdeISO(f){
  var p=f.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

window.onload=function(){
  var hoy=new Date().toISOString().split("T")[0];
  document.getElementById("fechaParte").value=hoy;
  actualizarFecha();
}

document.getElementById("fechaParte").addEventListener("change",actualizarFecha);

function actualizarFecha(){
  var f=document.getElementById("fechaParte").value;
  document.getElementById("fechaTexto").innerText=fechaArgentinaDesdeISO(f);
}

function guardarParte(){

  var fechaISO=document.getElementById("fechaParte").value;
  var fecha=fechaArgentinaDesdeISO(fechaISO);

  var payload={
    fecha:fecha,
    yacimiento:"Señal Picada",
    supervisor:"Supervisor",
    equipos:[]
  };

  fetch(API+"?action=guardarParteCompleto",{
    method:"POST",
    body:JSON.stringify(payload)
  })
  .then(()=>alert("Guardado con fecha: "+fecha))
  .catch(()=>alert("Error al guardar"));
}

</script>

</body>
</html>
