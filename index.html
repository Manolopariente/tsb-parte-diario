<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSB — Parte Diario</title>
<style>
body{font-family:sans-serif;background:#f0f2f5;padding:20px;}
.banner{background:#1e3070;color:white;padding:15px;border-radius:10px;margin-bottom:15px;}
</style>
</head>

<body>

<div class="banner">
  <h2 id="titulo">Parte Diario</h2>

  <label>Fecha</label><br>
  <input type="date" id="fechaParte"><br><br>

  <div id="fechaMostrada"></div>
</div>

<script>

function formatear(fecha){
  var d=new Date(fecha);
  return d.getDate().toString().padStart(2,'0')+"/"+
         (d.getMonth()+1).toString().padStart(2,'0')+"/"+
         d.getFullYear();
}

window.onload=function(){
  var hoy=new Date().toISOString().split("T")[0];
  document.getElementById("fechaParte").value=hoy;
  document.getElementById("fechaMostrada").innerText=formatear(hoy);
}

document.getElementById("fechaParte").addEventListener("change",function(){
  document.getElementById("fechaMostrada").innerText=formatear(this.value);
});

</script>

</body>
</html>
